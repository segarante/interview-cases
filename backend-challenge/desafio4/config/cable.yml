development:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL", "redis://localhost:6390/0") %>
  channel_prefix: desafio4_development

test:
  adapter: test

production:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day
