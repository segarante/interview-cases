services:
  db:
    image: postgres:17-alpine
    container_name: desafio4_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: desafio4_development
    ports:
      - "5440:5432"
    volumes:
      - desafio4_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: desafio4_app
    command: >
      bash -c "rm -f tmp/pids/server.pid &&
               bin/rails db:prepare &&
               bin/rails server -b 0.0.0.0 -p 3000"
    environment:
      RAILS_ENV: development
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
    volumes:
      - .:/rails
      - desafio4_bundle:/usr/local/bundle
    ports:
      - "3030:3000"
    depends_on:
      db:
        condition: service_healthy
    tty: true
    stdin_open: true

  adminer:
    image: adminer:latest
    container_name: desafio4_adminer
    ports:
      - "8765:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: pepa-linha-dark
    volumes:
      - ./docker/adminer/index.php:/var/www/html/index.php:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  desafio4_pgdata:
  desafio4_bundle:
